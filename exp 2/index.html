<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <h2 class="logo">AnimeWorld</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#anime">Top Anime</a></li>
            <li><a href="#characters">Characters</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h1>Welcome to Anime World</h1>
    <p>Explore the world of anime</p>
    <button onclick="showMessage()">Click Me</button>
</section>

<section id="anime" class="section">
    <h2>Top Anime</h2>
    <div class="cards">
        <div class="card">Naruto</div>
        <div class="card">Attack on Titan</div>
        <div class="card">Death Note</div>
        <div class="card">One Piece</div>
    </div>
</section>

<section id="characters" class="section">
    <h2>Popular Characters</h2>
    <ul id="characterList"></ul>
</section>

<footer id="contact">
    <p>AnimeWorld © 2026</p>
</footer>

<script src="script.js"></script>
</body>
</html>
