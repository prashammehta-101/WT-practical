<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Landing Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#">LANDING</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#features">Features</a></li>
                <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<section id="home" class="hero d-flex align-items-center text-center">
    <div class="container">
        <h1 class="fade-in">Responsive Landing Page</h1>
        <p class="fade-in">Designed using Bootstrap and CSS3</p>
        <button class="btn btn-primary" onclick="showMessage()">Get Started</button>
    </div>
</section>

<!-- Features Section -->
<section id="features">
    <div class="container text-center">
        <h2>Features</h2>
        <div class="row mt-4">

            <div class="col-md-4">
                <div class="card p-3" onclick="featureClick('Responsive Design')">
                    <h4>Responsive</h4>
                    <p>Works on Mobile, Tablet and Desktop</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3" onclick="featureClick('Bootstrap Grid')">
                    <h4>Bootstrap</h4>
                    <p>Uses Bootstrap Grid System</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3" onclick="featureClick('CSS Styling')">
                    <h4>CSS3</h4>
                    <p>Modern UI with CSS Styling</p>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- Contact Section -->
<section id="contact">
    <div class="container text-center">
        <h2>Contact Us</h2>

        <form onsubmit="return validateForm()" class="w-50 mx-auto mt-3">
            <input type="text" id="name" placeholder="Enter Name" class="form-control mb-2">
            <input type="email" id="email" placeholder="Enter Email" class="form-control mb-2">
            <button class="btn btn-success">Submit</button>
        </form>
    </div>
</section>

<!-- Footer -->
<footer class="text-center p-3">
    <p>© 2026 Responsive Landing Page Experiment</p>
</footer>

<!-- JS -->
<script src="script.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
